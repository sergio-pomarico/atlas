name: Backend Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "turbo.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/backend-tests.yml"

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://atlas:atlas@localhost:5432/atlas_test
        run: pnpm --filter @atlas/api db:generate

      - name: Check backend types
        run: pnpm --filter @atlas/api type-check

      - name: Run backend tests
        run: pnpm --filter @atlas/api test
